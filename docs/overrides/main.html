{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ page.title if page and page.title else config.site_name }}">
  <meta property="og:description" content="{{ page.meta.get('description', config.site_description) if page and page.meta else config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url if page and page.canonical_url else config.site_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/aisketcher-social-preview-github.jpg">
  <meta property="og:image:width" content="1731">
  <meta property="og:image:height" content="909">
  <meta property="og:image:alt" content="Pocket Kingdom paper-art hero concept for AIsketcher">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title if page and page.title else config.site_name }}">
  <meta name="twitter:description" content="{{ page.meta.get('description', config.site_description) if page and page.meta else config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/aisketcher-social-preview-github.jpg">
{% endblock %}
