name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Pillow>=9.5,<13" "build>=1.2,<2" "pytest>=8,<9" "ruff>=0.12,<1" "twine>=6,<7"
          python -m pip install --no-deps -e .

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Build distribution
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*
