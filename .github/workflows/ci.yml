name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install core development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run core, CLI, config, and documentation policy tests
        run: python -m pytest tests/core tests/docs tests/test_cli.py tests/test_config.py

  quality:
    name: Static quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run Ruff
        run: python -m ruff check src examples tests
      - name: Run strict type checking
        run: python -m mypy src/aisketcher

  studio:
    name: Studio / Gradio 6
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Studio test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,demo]"
      - name: Run Studio tests
        run: python -m pytest tests/app

  docs:
    name: Documentation / strict
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[docs,dev]"
      - name: Validate documentation contracts
        run: python -m pytest tests/docs
      - name: Build documentation with warnings as errors
        run: mkdocs build --strict --site-dir site

  package:
    name: Distribution / policy scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Build wheel and source archive
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Scan source and distributable contents
        run: python tests/docs/scan_distribution.py --repository . dist/*
      - name: Smoke-test the installed Studio wheel
        run: |
          wheel_path="$(python -c 'import glob, os; print(os.path.abspath(glob.glob("dist/*.whl")[0]))')"
          python -m venv /tmp/aisketcher-wheel-smoke
          /tmp/aisketcher-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/aisketcher-wheel-smoke/bin/python -m pip install "${wheel_path}[demo]"
          /tmp/aisketcher-wheel-smoke/bin/aisketcher --version
          /tmp/aisketcher-wheel-smoke/bin/python tests/docs/wheel_smoke.py
      - name: Upload reviewed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7
